<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informe Técnico Detallado</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <style>
        body {
            box-sizing: border-box;
            min-width: 200px;
            max-width: 980px;
            margin: 0 auto;
            padding: 45px;
            background-color: white;
        }
        @media (max-width: 767px) {
            body { padding: 15px; }
        }
        .markdown-body {
            font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
            font-size: 14px;
            line-height: 1.6;
        }
        pre { background-color: #f6f8fa; padding: 16px; border-radius: 6px; }
        .mermaid { 
            background: white; 
            text-align: center; 
            margin-bottom: 30px; 
            margin-top: 20px;
            page-break-inside: avoid;
        }
        h1, h2, h3 { page-break-after: avoid; }
        table { page-break-inside: auto; }
        tr { page-break-inside: avoid; page-break-after: auto; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</head>
<body class="markdown-body">
    <div id="content"></div>

    <script>
        // Mermaid configuration
        mermaid.initialize({ 
            startOnLoad: false, 
            theme: 'default',
            securityLevel: 'loose',
            flowchart: { useMaxWidth: true, htmlLabels: true }
        });

        function b64ToUtf8(str) {
            return decodeURIComponent(Array.prototype.map.call(atob(str), function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }

        async function render() {
            try {
                const mdB64 = "MARKDOWN_B64_PLACEHOLDER";
                const md = b64ToUtf8(mdB64);
                
                const html = marked.parse(md);
                document.getElementById('content').innerHTML = html;

                // Convert code blocks with class "language-mermaid" to div.mermaid
                const mermaidBlocks = document.querySelectorAll('pre code.language-mermaid');
                mermaidBlocks.forEach(block => {
                    const pre = block.parentElement;
                    const div = document.createElement('div');
                    div.className = 'mermaid';
                    div.textContent = block.textContent;
                    pre.parentElement.replaceChild(div, pre);
                });

                await mermaid.run();
                
                // Signal playwright that we are ready
                window.rendered = true;
            } catch (err) {
                document.getElementById('content').innerHTML = "<h1>Error de renderizado</h1><pre>" + err.message + "</pre>";
                console.error(err);
            }
        }

        render();
    </script>
</body>
</html>
